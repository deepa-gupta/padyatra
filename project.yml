name: PadYatra
options:
  bundleIdPrefix: com.padyatra
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES
    DEVELOPMENT_TEAM: ""

targets:
  PadYatra:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PadYatra
    resources:
      - path: PadYatra/Data/Static/temples.json
      - path: PadYatra/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.padyatra.app
        INFOPLIST_FILE: PadYatra/Info.plist
        SWIFT_VERSION: "6.0"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: PadYatra/PadYatra.entitlements
    dependencies:
      - sdk: CloudKit.framework
      - sdk: CoreLocation.framework
      - sdk: MapKit.framework
      - sdk: EventKit.framework
      - sdk: WidgetKit.framework

  PadYatraTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PadYatraTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.padyatra.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PadYatra
